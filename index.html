<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ডিজিটাল হেল্পলাইন - নেত্রকোনা</title>
    <style>
        /* আপনার আগের ডিজাইন অনুযায়ী স্টাইল */
        :root { --primary-color: #2c3e50; --secondary-color: #3498db; }
        body { font-family: 'SolaimanLipi', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--primary-color); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; }
        .btn-call { display: block; width: 100%; padding: 12px; background: #27ae60; color: white; text-align: center; text-decoration: none; border-radius: 8px; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>ডিজিটাল হেল্পলাইন</h2>
    
    <div class="form-group">
        <label>জেলা নির্বাচন করুন:</label>
        <select id="district">
            <option value="netrokona">নেত্রকোনা</option>
        </select>
    </div>

    <div class="form-group">
        <label>উপজেলা নির্বাচন করুন:</label>
        <select id="upazila">
            <option value="">নির্বাচন করুন</option>
            <option value="madon">মদন</option>
            <option value="sodar">নেত্রকোনা সদর</option>
            <option value="kendua">কেন্দুয়া</option>
            <option value="purbodhala">পূর্বধলা</option>
            <option value="mohongonj">মোহনগঞ্জ</option>
            <option value="barhatta">বারহাট্টা</option>
            <option value="kalmakanda">কলমাকান্দা</option>
            <option value="durgapur">দুর্গাপুর</option>
            <option value="khaliajuri">খালিয়াজুরী</option>
            <option value="atpara">আটপাড়া</option>
        </select>
    </div>

    <div class="form-group">
        <label>সেবার ধরন:</label>
        <select id="service">
            <option value="">নির্বাচন করুন</option>
            <option value="ambulance">অ্যাম্বুলেন্স</option>
            <option value="fire">ফায়ার সার্ভিস</option>
            <option value="police">পুলিশ</option>
            <option value="blood">রক্তদাতা</option>
        </select>
    </div>

    <div id="result-area">
        </div>
</div>

<script>
    // এখানে আপনি ভবিষ্যতে জাভাস্ক্রিপ্ট দিয়ে নম্বরগুলো কন্ট্রোল করতে পারবেন
    // আপাতত এটি আপনার অ্যাপের কাঠামো তৈরি করে দিল
</script>

</body>
</html>
