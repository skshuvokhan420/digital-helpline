<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ডিজিটাল হেল্পলাইন - এস.কে. শুভ</title>
    <style>
        :root { --primary: #009432; --whatsapp: #25D366; --train: #da9100; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 10px solid var(--primary); }
        h2 { color: var(--primary); text-align: center; margin-bottom: 5px; }
        .tagline { text-align: center; color: #666; font-size: 13px; margin-bottom: 20px; }
        
        label { font-weight: bold; display: block; margin-top: 12px; color: #333; font-size: 14px; }
        select, input, button { width: 100%; padding: 12px; margin-top: 5px; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; outline: none; box-sizing: border-box; }
        
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        button:active { transform: scale(0.98); }
        
        .train-section { background: #fff3e0; padding: 15px; border-radius: 15px; border: 1px solid #ffcc80; margin-top: 20px; }
        .ticket-btn { background: var(--train); margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        .wa-section { background: #e7f3ff; padding: 15px; border-radius: 15px; margin-top: 25px; border: 1px solid #b2d7ff; }
        .wa-btn { background: var(--whatsapp); color: white; border: none; }
        
        .result-box { margin-top: 20px; padding: 15px; background: #fff9c4; border-radius: 10px; border-left: 5px solid #fbc02d; display: none; font-size: 14px; line-height: 1.6; }
        footer { text-align: center; margin-top: 20px; font-size: 12px; color: #888; }
    </style>
</head>
<body>

<div class="container">
    <h2>🇧🇩 ডিজিটাল হেল্পলাইন</h2>
    <p class="tagline">আপনার হাতের মুঠোয় সব জরুরি সেবা</p>
    
    <label>বিভাগ</label>
    <select id="division" onchange="updateDistricts()">
        <option value="">বিভাগ বেছে নিন</option>
        <option value="Dhaka">ঢাকা</option>
        <option value="Mymensingh">ময়মনসিংহ</option>
        <option value="Chattogram">চট্টগ্রাম</option>
        <option value="Rajshahi">রাজশাহী</option>
        <option value="Sylhet">সিলেট</option>
    </select>

    <label>জেলা</label>
    <select id="district" onchange="updateThanas()">
        <option value="">আগে বিভাগ বেছে নিন</option>
    </select>

    <label>থানা/উপজেলা</label>
    <select id="thana">
        <option value="">আগে জেলা বেছে নিন</option>
    </select>

    <label>সেবা নির্বাচন করুন</label>
    <select id="service">
        <option value="">সেবা নির্বাচন করুন</option>
        <option value="999">📞 জরুরি নাম্বার (999)</option>
        <option value="blood">🩸 রক্তদাতা (Blood)</option>
        <option value="ambulance">🚑 অ্যাম্বুলেন্স</option>
        <option value="fire">🔥 ফায়ার সার্ভিস</option>
        <option value="police">🚓 পুলিশ/থানা</option>
        <option value="doctor">👨‍⚕️ বিশেষজ্ঞ ডাক্তার</option>
        <option value="pharmacy">💊 ফার্মেসি</option>
        <option value="hospital">🏥 হাসপাতাল</option>
        <option value="journalist">🎤 সাংবাদিক</option>
        <option value="lawyer">⚖️ আইনজীবী</option>
        <option value="electrician">⚡ ইলেকট্রিশিয়ান</option>
    </select>

    <button onclick="searchInfo()">🔍 তথ্য খুঁজুন</button>

    <div class="train-section">
        <strong style="color: #e65100; font-size: 15px;">🚆 ঢাকা (কমলাপুর) ⇄ মোহনগঞ্জ</strong>
        <p style="font-size: 12px; color: #5d4037; margin: 5px 0;">মোহনগঞ্জ ও হাওর এক্সপ্রেসের টিকেট কাটুন</p>
        <button class="ticket-btn" onclick="bookTicket()">🎫 অনলাইন টিকেট কাটুন</button>
    </div>

    <div id="result" class="result-box"></div>

    <div class="wa-section">
        <h3 style="margin:0 0 10px 0; color: #0d47a1; font-size: 16px;">📝 নতুন তথ্য যোগ করুন</h3>
        <input type="text" id="wa-name" placeholder="নাম বা প্রতিষ্ঠানের নাম">
        <input type="tel" id="wa-phone" placeholder="মোবাইল নম্বর">
        <button class="wa-btn" onclick="sendToWhatsApp()">📲 হোয়াটসঅ্যাপে পাঠান</button>
    </div>

    <footer>Developed by S.K. Shuvo</footer>
</div>

<script>
    const myNumber = "8801771100830"; 

    const data = {
        "Mymensingh": {
            "ময়মনসিংহ": ["সদর", "মুক্তাগাছা", "ফুলপুর", "ত্রিশাল", "ভালুকা", "গফরগাঁও", "ঈশ্বরগঞ্জ", "হালুয়াঘাট"],
            "নেত্রকোনা": ["সদর", "মদন", "মোহনগঞ্জ", "পূর্বধলা", "কলমাকান্দা", "বারহাট্টা", "দুর্গাপুর", "খালিয়াজুরী", "কেন্দুয়া", "আটপাড়া"],
            "শেরপুর": ["সদর", "নালিতাবাড়ী", "নকলা"],
            "জামালপুর": ["সদর", "বকশীগঞ্জ", "ইসলামপুর"]
        },
        "Dhaka": {
            "ঢাকা": ["সদর", "সাভার", "ধামরাই", "কেরানীগঞ্জ"],
            "গাজীপুর": ["সদর", "কালিয়াকৈর", "শ্রীপুর"]
        }
    };

    function updateDistricts() {
        const div = document.getElementById('division').value;
        const distSelect = document.getElementById('district');
        const thanaSelect = document.getElementById('thana');
        distSelect.innerHTML = '<option value="">জেলা সিলেক্ট করুন</option>';
        thanaSelect.innerHTML = '<option value="">আগে জেলা বেছে নিন</option>';
        if(div && data[div]) {
            for(let dist in data[div]) {
                distSelect.add(new Option(dist, dist));
            }
        }
    }

    function updateThanas() {
        const div = document.getElementById('division').value;
        const dist = document.getElementById('district').value;
        const thanaSelect = document.getElementById('thana');
        thanaSelect.innerHTML = '<option value="">থানা সিলেক্ট করুন</option>';
        if(div && dist && data[div][dist]) {
            data[div][dist].forEach(th => {
                thanaSelect.add(new Option(th, th));
            });
        }
    }

    function searchInfo() {
        const dist = document.getElementById('district').value;
        const thana = document.getElementById('thana').value;
        const serv = document.getElementById('service').value;
        const res = document.getElementById('result');

        if (serv === "999") { window.location.href = "tel:999"; return; }

        if(!thana || !serv) {
            alert("সবগুলো ঘর পূরণ করুন!");
            return;
        }

        // সব তথ্য এখন স্ক্রিনে পপ-আপ আকারে ভেসে উঠবে
        if (serv === "lawyer" && dist === "নেত্রকোনা") {
            const message = "⚖️ আইনজীবী তথ্য\n\nস্থান: নেত্রকোনা জজ কোর্ট\nমোবাইল: 01718037814\n\nআপনি কি সরাসরি কল করতে চান?";
            if (confirm(message)) {
                window.location.href = "tel:01718037814";
            }
        } else {
            // অন্য কোনো তথ্য না থাকলে এটি দেখাবে
            alert("📌 দুঃখিত!\n\nবর্তমানে " + thana + " এলাকায় এই সেবার বিস্তারিত তথ্য আমাদের কাছে নেই। খুব দ্রুত যোগ করা হবে।");
        }
    }

    function bookTicket() {
        alert("টিকেট কাটার সময় 'From' এ DHAKA এবং 'To' এ MOHANGANJ লিখুন।");
        window.open("https://eticket.railway.gov.bd/", "_blank");
    }

    function sendToWhatsApp() {
        const name = document.getElementById('wa-name').value;
        const phone = document.getElementById('wa-phone').value;
        if(!name || !phone) { alert("নাম ও নম্বর দিন"); return; }
        const text = `হ্যালো শুভ ভাই,%0Aনতুন হেল্পলাইন তথ্য:%0Aনাম: ${name}%0Aফোন: ${phone}`;
        window.open(`https://api.whatsapp.com/send?phone=${myNumber}&text=${text}`, '_blank');
    }function updateDistricts() {
    const division = document.getElementById('division').value;
    const districtSelect = document.getElementById('district');
    districtSelect.innerHTML = '<option value="">জেলা বেছে নিন</option>';

    const districts = {
        dhaka: ["ঢাকা", "গাজীপুর", "নারায়ণগঞ্জ", "নরসিংদী", "মানিকগঞ্জ", "মুন্সীগঞ্জ", "ফরিদপুর", "মাদারীপুর", "শরীয়তপুর", "রাজবাড়ী", "গোপালগঞ্জ", "টাঙ্গাইল", "কিশোরগঞ্জ"],
        mymensingh: ["ময়মনসিংহ", "নেত্রকোনা", "শেরপুর", "জামালপুর"],
        chittagong: ["চট্টগ্রাম", "কক্সবাজার", "ব্রাহ্মণবাড়িয়া", "চাঁদপুর", "লক্ষ্মীপুর", "নোয়াখালী", "ফেনী", "খাগড়াছড়ি", "রাঙ্গামাটি", "বান্দরবান", "কুমিল্লা"],
        rajshahi: ["রাজশাহী", "চাঁপাইনবাবগঞ্জ", "নাটোর", "নওগাঁ", "পাবনা", "সিরাজগঞ্জ", "বগুড়া", "জয়পুরহাট"],
        sylhet: ["সিলেট", "মৌলভীবাজার", "হবিগঞ্জ", "সুনামগঞ্জ"]
    };

    if (division && districts[division]) {
        districts[division].forEach(dist => {
            const option = document.createElement('option');
            option.value = dist;
            option.textContent = dist;
            districtSelect.appendChild(option);
        });
    }
}

</script>

</body>
</html>
