<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ডিজিটাল হেল্পলাইন - এস.কে. শুভ</title>
    <style>
        :root { --primary: #009432; --whatsapp: #25D366; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 10px solid var(--primary); }
        h2 { color: var(--primary); text-align: center; margin-bottom: 5px; }
        .tagline { text-align: center; color: #666; font-size: 14px; margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-top: 12px; color: #333; }
        select, input, button { width: 100%; padding: 12px; margin-top: 5px; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; outline: none; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .wa-section { background: #e7f3ff; padding: 15px; border-radius: 15px; margin-top: 30px; border: 1px solid #b2d7ff; }
        .wa-btn { background: var(--whatsapp); color: white; border: none; }
        .result-box { margin-top: 20px; padding: 15px; background: #fff9c4; border-radius: 10px; border-left: 5px solid #fbc02d; display: none; }
        footer { text-align: center; margin-top: 20px; font-size: 12px; color: #888; }
    </style>
</head>
<body>

<div class="container">
    <h2>🇧🇩 ডিজিটাল হেল্পলাইন</h2>
    <p class="tagline">অ্যাপে কোন সমস্যা হলে সরাসরি আমাদের সাথে যোগাযোগ করুন নিচে👇 whatsapp </p>
    
    <label>বিভাগ</label>
    <select id="division" onchange="updateDistricts()">
        <option value="">বিভাগ বেছে নিন</option>
        <option value="Dhaka">ঢাকা</option>
        <option value="Mymensingh">ময়মনসিংহ</option>
        <option value="Chattogram">চট্টগ্রাম</option>
    </select>

    <label>জেলা</label>
    <select id="district" onchange="updateThanas()">
        <option value="">আগে বিভাগ বেছে নিন</option>
    </select>

    <label>থানা/উপজেলা</label>
    <select id="thana">
        <option value="">আগে জেলা বেছে নিন</option>
    </select>

    <label>সেবা</label>
    <select id="service">
        <option value="">সেবা নির্বাচন করুন</option>
        <option value="জরুরি নাম্বার">📞 জরুরি নাম্বার (999)</option>
        <option value="রক্তদাতা">🩸 রক্তদাতা (Blood)</option>
        <option value="অ্যাম্বুলেন্স">🚑 অ্যাম্বুলেন্স</option>
        <option value="ফায়ার সার্ভিস">🔥 ফায়ার সার্ভিস</option>
        <option value="পুলিশ">🚓 পুলিশ/থানা</option>
        <option value="ডাক্তার">👨‍⚕️ বিশেষজ্ঞ ডাক্তার</option>
    </select>

    <button onclick="searchInfo()">🔍 তথ্য খুঁজুন</button>

    <div id="result" class="result-box"></div>

    <div class="wa-section">
        <h3 style="margin:0 0 10px 0; color: #0d47a1; font-size: 17px;">📝 নতুন নম্বর যোগ করুন</h3>
        <input type="text" id="wa-name" placeholder="প্রতিষ্ঠানের নাম">
        <input type="tel" id="wa-phone" placeholder="মোবাইল নম্বর">
        <button class="wa-btn" onclick="sendToWhatsApp()">📲 হোয়াটসঅ্যাপে পাঠান</button>
    </div>

    <footer>Developed by S.K. Shuvo</footer>
</div>

<script>
    const myNumber = "8801771100830"; 

    // ডাটাবেজ (বিভাগ > জেলা > থানা)
    const data = {
        "Dhaka": {
            "ঢাকা": ["সদর", "সাভার", "ধামরাই"],
            "গাজীপুর": ["সদর", "কালিয়াকৈর", "শ্রীপুর"]
        },
        "Mymensingh": {
            "ময়মনসিংহ": ["সদর", "মুক্তাগাছা", "ফুলপুর", "ত্রিশাল"],
            "নেত্রকোনা": ["সদর", "মদন", "মোহনগঞ্জ", "পূর্বধলা", "কলমাকান্দা"]
        },
        "Chattogram": {
            "চট্টগ্রাম": ["সদর", "পটিয়া", "হাটহাজারী"],
            "কুমিল্লা": ["সদর", "চৌদ্দগ্রাম", "লাকসাম"]
        }
    };

    function updateDistricts() {
        const div = document.getElementById('division').value;
        const distSelect = document.getElementById('district');
        const thanaSelect = document.getElementById('thana');
        
        distSelect.innerHTML = '<option value="">জেলা সিলেক্ট করুন</option>';
        thanaSelect.innerHTML = '<option value="">আগে জেলা বেছে নিন</option>';

        if(div && data[div]) {
            for(let dist in data[div]) {
                distSelect.add(new Option(dist, dist));
            }
        }
    }

    function updateThanas() {
        const div = document.getElementById('division').value;
        const dist = document.getElementById('district').value;
        const thanaSelect = document.getElementById('thana');
        
        thanaSelect.innerHTML = '<option value="">থানা সিলেক্ট করুন</option>';

        if(div && dist && data[div][dist]) {
            data[div][dist].forEach(th => {
                thanaSelect.add(new Option(th, th));
            });
        }
    }

    function searchInfo() {
        const thana = document.getElementById('thana').value;
        const serv = document.getElementById('service').value;
        const res = document.getElementById('result');

        if (serv === "জরুরি নাম্বার") {
            window.location.href = "tel:999";
            return;
        }

        if(!thana || !serv) {
            alert("দুঃখিত, কোনো তথ্য পাওয়া যায়নি! সব ঘর পূরণ করুন।");
            return;
        }

        res.style.display = "block";
        res.innerHTML = `<strong>📌 ফলাফল:</strong><br> ${thana} এলাকায় বর্তমানে "${serv}" ক্যাটাগরিতে কোনো নম্বর নেই।`;
        alert("দুঃখিত, কোনো নাম্বার নাই");
    }

    function sendToWhatsApp() {
        const name = document.getElementById('wa-name').value;
        const phone = document.getElementById('wa-phone').value;
        if(!name || !phone) { alert("নাম ও নম্বর দিন"); return; }
        const text = `হ্যালো শুভ ভাই, নতুন তথ্য: %0Aনাম: ${name}%0Aফোন: ${phone}`;
        window.open(`https://api.whatsapp.com/send?phone=${myNumber}&text=${text}`, '_blank');
    }
</script>

</body>
</html>
